<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silent Timer Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&display=swap");

      body {
        font-family:
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background-color: transparent;
        margin: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .widget-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
      }

      .progress-ring__circle {
        transition:
          stroke-dasharray 0.6s cubic-bezier(0.4, 0, 0.2, 1),
          stroke 0.8s ease;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }

      @keyframes pulse-glow {
        0%,
        100% {
          filter: drop-shadow(0 0 4px currentColor);
          opacity: 1;
        }
        50% {
          filter: drop-shadow(0 0 12px currentColor);
          opacity: 0.7;
        }
      }

      .gauge-pulse {
        animation: pulse-glow 1s ease-in-out infinite;
      }

      #display {
        transition: color 0.8s ease;
      }

      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-slate-200/50">
    <div
      class="widget-card rounded-[40px] p-6 w-[380px] aspect-square text-center flex flex-col items-center justify-between"
    >
      <header class="w-full flex justify-between items-center px-2">
        <span
          class="text-xs font-semibold text-slate-500 uppercase tracking-widest"
          >Silent Timer</span
        >
        <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
      </header>

      <!-- Timer Circle -->
      <div class="relative flex items-center justify-center">
        <svg class="w-64 h-64" viewBox="0 0 256 256">
          <!-- Track -->
          <circle
            stroke-width="16"
            stroke="rgba(148,163,184,0.25)"
            fill="transparent"
            r="108"
            cx="128"
            cy="128"
          />
          <!-- Gauge -->
          <circle
            id="progress-bar"
            class="progress-ring__circle"
            stroke-width="16"
            stroke-dasharray="678.58 678.58"
            stroke-dashoffset="0"
            stroke-linecap="round"
            stroke="#3b82f6"
            fill="transparent"
            r="108"
            cx="128"
            cy="128"
          />
          <!-- Dot at 12 o'clock (100% mark) -->
          <circle id="gauge-dot" cx="128" cy="20" r="8" fill="#3b82f6" />
          <!-- Moving dot at the draining tip -->
          <circle
            id="tip-dot"
            cx="128"
            cy="20"
            r="10"
            fill="white"
            stroke="#3b82f6"
            stroke-width="4"
          />
        </svg>
        <div
          id="display"
          class="absolute text-5xl font-semibold tabular-nums"
          style="color: #3b82f6"
        >
          50:00
        </div>
      </div>

      <!-- Controls -->
      <div class="flex gap-3 w-full">
        <button
          id="startPauseBtn"
          class="flex-1 text-white py-3 rounded-2xl font-medium transition-all active:scale-95 shadow-lg"
          style="
            background-color: #3b82f6;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
          "
        >
          시작
        </button>
        <button
          id="resetBtn"
          class="bg-white/50 hover:bg-white text-slate-600 px-5 py-3 rounded-2xl font-medium transition-all active:scale-95 border border-white/50"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
        </button>
      </div>
    </div>

    <script>
      const INITIAL_TIME = 50 * 60;
      let timeLeft = INITIAL_TIME;
      let timerId = null;
      let isRunning = false;
      let wakeLock = null;

      const display = document.getElementById("display");
      const progressBar = document.getElementById("progress-bar");
      const startPauseBtn = document.getElementById("startPauseBtn");
      const resetBtn = document.getElementById("resetBtn");
      const statusDot = document.getElementById("status-dot");
      const gaugeDot = document.getElementById("gauge-dot");
      const tipDot = document.getElementById("tip-dot");

      // r=108 → circumference = 2π×108 ≈ 678.58
      const CIRCUMFERENCE = 2 * Math.PI * 108;

      // ----- Color helpers -----
      function lerpColor(a, b, t) {
        const ah = a.replace("#", "");
        const bh = b.replace("#", "");
        const ar = parseInt(ah.slice(0, 2), 16),
          ag = parseInt(ah.slice(2, 4), 16),
          ab = parseInt(ah.slice(4, 6), 16);
        const br = parseInt(bh.slice(0, 2), 16),
          bg = parseInt(bh.slice(2, 4), 16),
          bb = parseInt(bh.slice(4, 6), 16);
        const rr = Math.round(ar + (br - ar) * t);
        const rg = Math.round(ag + (bg - ag) * t);
        const rb = Math.round(ab + (bb - ab) * t);
        return `#${rr.toString(16).padStart(2, "0")}${rg.toString(16).padStart(2, "0")}${rb.toString(16).padStart(2, "0")}`;
      }

      // Progress 1.0 (full) → 0.0 (empty)
      // Zones: 1.0→0.6 blue, 0.6→0.3 amber, 0.3→0.1 orange, 0.1→0.0 red
      function gaugeColor(progress) {
        if (progress >= 0.6) {
          const t = (1 - progress) / 0.4; // 0→1 as progress goes 1→0.6
          return lerpColor("#3b82f6", "#f59e0b", t);
        } else if (progress >= 0.3) {
          const t = (0.6 - progress) / 0.3;
          return lerpColor("#f59e0b", "#f97316", t);
        } else if (progress >= 0.1) {
          const t = (0.3 - progress) / 0.2;
          return lerpColor("#f97316", "#ef4444", t);
        } else {
          return "#ef4444";
        }
      }

      function shadowFor(color, alpha) {
        return `0 8px 20px ${color}${Math.round(alpha * 255)
          .toString(16)
          .padStart(2, "0")}`;
      }

      // ----- Wake lock -----
      async function requestWakeLock() {
        try {
          if ("wakeLock" in navigator) {
            wakeLock = await navigator.wakeLock.request("screen");
          }
        } catch (err) {
          console.error(`${err.name}, ${err.message}`);
        }
      }

      function releaseWakeLock() {
        if (wakeLock !== null) {
          wakeLock.release();
          wakeLock = null;
        }
      }

      // ----- Display update -----
      function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        display.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

        const progress = timeLeft / INITIAL_TIME;
        // Gauge drains: arc length shrinks from the tail end
        const arcLength = CIRCUMFERENCE * progress;
        progressBar.setAttribute(
          "stroke-dasharray",
          `${arcLength} ${CIRCUMFERENCE}`,
        );

        const color = gaugeColor(progress);
        progressBar.setAttribute("stroke", color);
        gaugeDot.setAttribute("fill", color);
        display.style.color = color;

        // Move tip dot to the draining end of the arc
        // Arc starts at -90° (12 o'clock) and the tip is at -90° + progress*360°
        const angle = -Math.PI / 2 + progress * 2 * Math.PI;
        const tipX = 128 + 108 * Math.cos(angle);
        const tipY = 128 + 108 * Math.sin(angle);
        tipDot.setAttribute("cx", tipX);
        tipDot.setAttribute("cy", tipY);
        tipDot.setAttribute("stroke", color);

        // Pulse when <= 10%
        if (progress <= 0.1 && isRunning) {
          progressBar.classList.add("gauge-pulse");
        } else {
          progressBar.classList.remove("gauge-pulse");
        }

        // Status dot color
        if (isRunning) {
          statusDot.style.backgroundColor = color;
        }

        // Button color
        if (isRunning) {
          startPauseBtn.style.backgroundColor = color;
          startPauseBtn.style.boxShadow = shadowFor(color, 0.35);
        }

        if (timeLeft === 0) {
          progressBar.classList.remove("gauge-pulse");
          releaseWakeLock();
        }
      }

      // ----- Controls -----
      function toggleTimer() {
        if (isRunning) {
          clearInterval(timerId);
          startPauseBtn.textContent = "계속";
          startPauseBtn.style.backgroundColor = "#64748b";
          startPauseBtn.style.boxShadow = "0 8px 20px rgba(100,116,139,0.35)";
          statusDot.style.backgroundColor = "#cbd5e1";
          progressBar.classList.remove("gauge-pulse");
          releaseWakeLock();
        } else {
          if (timeLeft === 0) resetTimer();
          requestWakeLock();
          timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
              clearInterval(timerId);
              isRunning = false;
              startPauseBtn.textContent = "완료";
              startPauseBtn.style.backgroundColor = "#22c55e";
              startPauseBtn.style.boxShadow = "0 8px 20px rgba(34,197,94,0.35)";
              statusDot.style.backgroundColor = "#22c55e";
            }
          }, 1000);
          startPauseBtn.textContent = "일시정지";
          const color = gaugeColor(timeLeft / INITIAL_TIME);
          startPauseBtn.style.backgroundColor = color;
          startPauseBtn.style.boxShadow = shadowFor(color, 0.35);
          statusDot.style.backgroundColor = color;
        }
        isRunning = !isRunning;
      }

      function resetTimer() {
        clearInterval(timerId);
        timeLeft = INITIAL_TIME;
        isRunning = false;
        releaseWakeLock();
        startPauseBtn.textContent = "시작";
        startPauseBtn.style.backgroundColor = "#3b82f6";
        startPauseBtn.style.boxShadow = "0 8px 20px rgba(59,130,246,0.35)";
        statusDot.style.backgroundColor = "#cbd5e1";
        progressBar.classList.remove("gauge-pulse");
        updateDisplay();
      }

      startPauseBtn.addEventListener("click", toggleTimer);
      resetBtn.addEventListener("click", resetTimer);

      updateDisplay();
    </script>
  </body>
</html>
